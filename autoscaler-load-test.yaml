---
# Autoscaler load test — Frankfurt (de/fra) diversity site
# Targets nodes with label ionos-site=fra1 specifically.
# Each FRA1 node has ~3.5 allocatable CPU; 5 pods fill one node and
# leave 1 Pending, which triggers the autoscaler to provision vcpu-fra1-224-31.
#
# Cleanup:  kubectl delete -f autoscaler-load-test.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: autoscaler-test
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-test
  namespace: autoscaler-test
  labels:
    app: load-test
spec:
  replicas: 6
  selector:
    matchLabels:
      app: load-test
  template:
    metadata:
      labels:
        app: load-test
    spec:
      # Pin to FRA1 diversity nodes only
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ionos-site
                    operator: In
                    values:
                      - fra1
      # Spread pods across FRA1 nodes so each fills independently
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: load-test
      containers:
        - name: pause
          image: busybox:latest
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "1500Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
