<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" role="img" aria-label="Red Hat OpenShift">
  <!-- Red Hat "shadowman" mark -->
  <g transform="translate(0,2)">
    <!-- Outer red circle -->
    <circle cx="24" cy="24" r="24" fill="#EE0000"/>
    <!-- Shadow/body of shadowman — white silhouette -->
    <!-- Head -->
    <circle cx="24" cy="15" r="5.5" fill="white"/>
    <!-- Body -->
    <path d="M14.5 34 C14.5 27 18.5 23.5 24 23.5 C29.5 23.5 33.5 27 33.5 34 Z" fill="white"/>
    <!-- Hat brim (wide) -->
    <ellipse cx="24" cy="13.5" rx="10" ry="2.8" fill="#EE0000"/>
    <!-- Hat crown -->
    <path d="M17 13.5 C17 7.5 20 5 24 5 C28 5 31 7.5 31 13.5 Z" fill="#EE0000"/>
    <!-- Hat crease highlight -->
    <path d="M21 5.8 Q24 4 27 5.8" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- "Red Hat" text -->
  <text x="60" y="24" font-family="'Red Hat Display','Overpass',Arial,sans-serif"
        font-weight="700" font-size="17" fill="white" letter-spacing="0.3">Red Hat</text>
  <!-- "OpenShift" text -->
  <text x="60" y="44" font-family="'Red Hat Display','Overpass',Arial,sans-serif"
        font-weight="400" font-size="17" fill="white" letter-spacing="0.3">OpenShift</text>
</svg>
